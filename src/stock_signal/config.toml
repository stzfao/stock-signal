# TOML configuration file for the app

[schedule]
price_staleness_hours = 3
fundamentals_staleness_days = 30  # financials + earnings: quarterly cadence

[datastore]
db_path = "data/stock_signal.duckdb"
output_dir = "data/output"

[fmp]
base_url = "https://financialmodelingprep.com/stable"
rpm = 150
max_conn = 10

[nyse]
base_url = "https://www.nyse.com/api"

[nyse.body]
instrument_type = "EQUITY"
sort_column = "NORMALIZED_TICKER"
sort_order = "ASC"
max_results_per_page = 6900
page_number = 1
filter_token = ""

[nasdaq]
base_url = "https://api.nasdaq.com/api/screener"
table_only = true
limit = 7000
# TODO check limit once

[slickcharts]
base_url = "https://www.slickcharts.com"

[stockanalysis]
base_url = "https://stockanalysis.com/_api/endpoints/screener/data-point"
rpm = 60
max_conn = 10